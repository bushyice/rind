[[service]]
name = "user_session"
run.exec = "/usr/bin/example-active"
run.args = ["user-session"]
restart = false
start-on = [{ state = "tr_demo@user_active" }]

[[service]]
name = "user_login"
run.exec = "/usr/bin/user_login"
run.args = []
restart = false
start-on = [{ state = "tr_demo@login_required" }]
transport = { id = "env", options = ["RIND_LOGIN_TTY=state:$/tty"] }
branching = { enabled = true, source-state = "tr_demo@login_required", key = "tty", max-instances = 16 }

[[service]]
name = "user_shell"
run.exec = "/usr/bin/user_shell"
run.args = []
restart = true
start-on = [{ state = "rind@user_session" }]
transport = { id = "env", options = ["RIND_USER_ACTIVE=state:rind@user_session"] }

[[service]]
name = "niri"
run.exec = "/usr/bin/example-active"
run.args = ["niri"]
restart = false
start-on = [{ state = "tr_demo@niri_active" }]
branching = { enabled = true, source-state = "tr_demo@niri_active", key = "tty", max-instances = 16 }

[[variable]]
name = "ttys"
default = ["/dev/tty1", "/dev/tty2"]

[[state]]
name = "login_required"
payload = "json"
branch = ["tty"]
activate-on-none = [{
  name = "rind@user_session",
  branch = "tty"
}]
auto-payload = {
  # there will be others such as system.field (defined by rind) or { eval = "/bin/sh -c 'ls /dev | grep tty'" }
  # where for .eval, each line is parsed separately or can be inserted directly as {eval = "...", insert = ["key"] or insert = "root" }

  # example:
  # for-each = ["system.config.tty"],
  # input = ["tty"],

  # but for now:
  variable = "ttys",
  many = true,
  insert = "tty"
}

[[state]]
name = "niri_active"
payload = "json"
branch = ["tty:seat"]
after = ["rind@user_session"]
