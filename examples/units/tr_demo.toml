[[service]]
name = "user_session"
run.exec = "/usr/bin/example-active"
run.args = ["user-session"]
restart = false
start-on = [{ facet = "tr_demo:user_active" }]

[[service]]
name = "user_login"
run.exec = "/usr/bin/user_login"
run.args = []
restart = false
start-on = [{ facet = "tty:login_required" }]
transport = { id = "env", options = ["RIND_LOGIN_TTY=facet:$/tty"] }
branching = { source = "tty:login_required", key = "tty", max-instances = 16 }

[[service]]
name = "user_shell"
run.exec = "/usr/bin/user_shell"
run.args = []
restart = false
start-on = [{ facet = "rind:user_session" }]
transport = { id = "env", options = ["RIND_USER_ACTIVE=facet:$"] }
branching = { source = "rind:user_session", key = "tty", max-instances = 16, except = ["facet:tty:taken"] }

[[service]]
name = "niri"
run.exec = "/usr/bin/example-active"
run.args = ["niri"]
restart = false
start-on = [{ facet = "tr_demo:niri_active" }]
branching = { source = "tr_demo:niri_active", key = "tty", max-instances = 16 }

[[facet]]
name = "niri_active"
payload = "json"
branch = ["seat:tty"]
after = ["rind:user_session"]
