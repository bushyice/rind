[[service]]
name = "three"
start-on = ["my_state"]
on-start = [{ signal = "else@my_signal", payload = "hi" }]
run.exec = "/usr/bin/example-active"
run.args = ["arg1", "arg2"]
restart = false
transport = ""

[[service]]
name = "four"
start-on = ["my_signal"]
run.exec = "/usr/bin/example-inactive"
run.args = ["arg1", "arg2"]
run.timer = { duration = "5s", restart = true }
singleton = true

[[state]]
name = "my_state"
payload = "json"
branch = ["id"]
#outputs = { pipe-to = "env", matcher = "ENV=(.+);", format = "$1" }

[[state]]
name = "some_state"
payload = "string"

[[socket]]
name = "four_starter"
type = "uds"
lifecycle = "owned"
listen = "/var/sock/my.sock"
owner = "else@four"
signal = "else@my_signal_2"

[[signal]]
name = "my_signal"
payload = "string"

[[signal]]
name = "my_signal_2"
payload = "json"
