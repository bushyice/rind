[[service]]
name = "three"
start-on = ["my_state"]
on-start = [{ signal = "else@my_signal", payload = "hi" }]
run.exec = "/usr/bin/example-active"
run.args = ["arg1", "arg2"]
restart = false
transport = ""

[[service]]
name = "four"
start-on = ["my_signal"]
run.exec = "/usr/bin/example-inactive"
run.args = ["arg1", "arg2"]
restart = true

[[state]]
name = "my_state"
payload = "json"
branch = ["id"]
#outputs = { pipe-to = "env", matcher = "ENV=(.+);", format = "$1" }

[[state]]
name = "some_state"
payload = "string"

[[signal]]
name = "my_signal"
payload = "string"
