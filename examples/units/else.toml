[[service]]
name = "three"
start-on = ["my_state"]
on-start = [{ impulse = "else:my_signal", payload = "hi" }]
run.exec = "/usr/bin/example-active"
run.args = ["arg1", "arg2"]
restart = false
transport = ""

[[service]]
name = "four"
start-on = ["my_signal"]
run.exec = "/usr/bin/ipc_so"
run.args = ["arg1", "arg2"]
on-start = [{ timer = "else:timeout_four" }]
singleton = true

[[facet]]
name = "my_state"
payload = "json"
branch = ["id"]
#outputs = { pipe-to = "env", matcher = "ENV=(.+);", format = "$1" }

[[facet]]
name = "some_state"
payload = "string"

[[socket]]
name = "four_starter"
type = "uds"
lifecycle = "owned"
listen = "/var/sock/my.sock"
owner = "else:four"
permissions = ["any"]

[[impulse]]
name = "my_signal"
payload = "string"

[[impulse]]
name = "my_signal_2"
payload = "json"

[[timer]]
name = "timeout_four"
duration = "5s"
finish = [{ service = "else:four", stop = true }]

[[socket]]
name = "some-sock"
type = "uds"
lifecycle = "owned"
listen = "/var/sock/asockuseless"
owner = "else:four"
permissions = ["any"]
start-on = ["rind:up!"]
on-start = [{ facet = "else:soc_up!" }]

[[facet]]
name = "soc_up!"
payload = "none"
