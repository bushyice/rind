[[service]]
name = "test"
run.exec = "/bin/tcp"
run.args = ["makano-test"]
space = "user"
user-source = { facet = "rind:user_session", username-field = "username" }
start-on = [{ facet = "rind:user_session" }]

[[service]]
name = "something"
run.exec = "/bin/tcp"
run.args = ["makano-test"]
run.env = { PORT = "4433" }
space = "user"
user-source = { facet = "rind:user_session", username-field = "username" }

[[service]]
name = "many"
run.variable = "someservice"
space = "user"
start-on = [{ facet = "rind:user_session" }, { facet = "rind:net-configured" }]
user-source = { facet = "rind:user_session", username-field = "username" }

[[variable]]
name = "someservice"
default = { exec = "/bin/tcp", args = ["makano-test"], env = { PORT = "4533" } }

[[impulse]]
name = "thething"
payload = "string"

[[service]]
name = "ipcs"
run.exec = "/bin/ipc_so"
run.args = ["makano-test"]
start-on = [{ impulse = "test:thething" }]

[[socket]]
name = "ipcs_s"
type = "uds"
listen = "/var/sock/some.sock"
owner = "test:ipcs"
start-on = [{ facet = "net:configured" }]
trigger = [{
  impulse = "test:thething",
  payload = "()"
}]

[[service]]
name = "sif"
run.exec = "/bin/sif"
transport = "stdio"
start-on = [{ impulse = "rind:boot" }]
restart = false
cgroup = { path = "/sys/fs/cgroup/rind-demo/sif", memory-max = "128M", cpu-max = "50000 100000", pids-max = "64" }
namespaces = { mount = true, uts = true, ipc = true, net = true, cgroup = true }
watchdog = { interval-ms = 1000, grace-ms = 5000, action = "restart" }

[[service]]
name = "shm"
run.exec = "/bin/shm"
transport = "shm"
start-on = [{ impulse = "rind:boot" }]
restart = false
