[[service]]
name = "uds_echo"
run.exec = "/usr/bin/example-uds"
run.args = ["--mode", "uds"]
restart = false
transport = { id = "uds", options = ["detached=true"] }

[[service]]
name = "env_consumer"
run.exec = "/usr/bin/example-active"
run.args = ["env-demo"]
restart = false
transport = { id = "env", options = ["DEMO_STATE=state:tp_demo:transport_state"] }

[[service]]
name = "args_consumer"
run.exec = "/usr/bin/example-active"
run.args = ["args-demo"]
restart = false
transport = { id = "args", options = ["--from-facet", "facet:tp_demo:transport_state"] }

[[facet]]
name = "transport_state"
payload = "string"
subscribers = [{ id = "uds", options = ["detached=true"], permissions = ["any"] }]

[[impulse]]
name = "demo_ping"
payload = "string"
subscribers = ["uds"]

