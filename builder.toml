  "ca-certificates:https://archlinux.org/packages/core/any/ca-certificates/download",
  "e2fsprogs:https://archlinux.org/packages/core/x86_64/e2fsprogs/download",
  "keyutils:https://archlinux.org/packages/core/x86_64/keyutils/download",
  "linux-headers:https://archlinux.org/packages/core/x86_64/linux-headers/download",

  # utils
  "socat:https://archlinux.org/packages/extra/x86_64/socat/download",
  "readline:https://archlinux.org/packages/core/x86_64/readline/download",
  "ncurses:https://archlinux.org/packages/core/x86_64/ncurses/download",
  "curl:https://archlinux.org/packages/core/x86_64/curl/download",
]

# C header files and static libs
libs = [
  "Crind-api:rind:crates/api"
]

# Busybox Setup
busybox_url = "https://busybox.net/downloads/binaries/1.19.0/busybox-x86_64"

# Use images for now, cpio is depricated
disk_mode = "image"

# Linux Image: for now we can use bzImage
linux_image = "bzImage:https://l4re.org/download/Linux-kernel/x86-64/bzImage-6.6.8"

# root= is needed for image disks
run_options = ["console=ttyS0/ root=/dev/vda rw"]
#qemu_options = { arch = "x86_64", args = [...] }

# Depricated
nodes = [
  # { path = "/dev/null", node_type = "c", major = 1, minor = 3, mode = 0o666 },
  # { path = "/dev/console", node_type = "c", major = 5, minor = 1, mode = 0o666 }
]

# format: /file:uid:gid:mode
disk_permissions = [
  "/usr/bin/rind:0:0:4755"
]

# Supported root env forms (written to /etc/rind/root.env):
# root_env = { RIND = "v0" }
# root_env = ["RIND", "v0"]
# root_envs = ["RIND", "v0"] # legacy alias
root_envs = [
  "RIND", "v0",
  "CPATH", "/usr/include",
  "TEST", "some-test"
]

[[profile.main.user]]
username = "makano"
password = "a"
uid = 1000
gid = 1000
home = "/home/makano"
shell = "/usr/bin/sh"
groups = ["wheel", { name = "network", gid = 1003 }]
# Supported env forms:
# env = { PATH = "/usr/bin:/bin", TERM = "linux" }
# env = ["PATH", "/usr/bin:/bin", "TERM", "linux"]
env = [
  "PATH", "/usr/bin"
]

[[profile.main.user]]
username = "root"
uid = 0
gid = 0
home = "/root"
shell = "/bin/sh"
env = [
  "TEST", "1"
]
