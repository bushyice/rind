
# Only one "main" profile is available for now
[profile.main]
# Build command
# example: build_command = "cargo metadata --no-deps --format-version=1 | jq -r '.packages[] | .name as $p | .targets[] | select(.kind[] | index(\"bin\")) | .name as $b | \"\\($p) \\($b)\"' | while read -r p b; do cargo sonic --target-cpus=raptorlake build -p \"$p\" --release --target x86_64-unknown-linux-gnu --bin \"$b\"; done"
build_command = "cargo build --release --target x86_64-unknown-linux-gnu -j 8"

# Which path the binaries are copied from
binary_target = "target/x86_64-unknown-linux-gnu/release"

# Default destination for binaries copied from `binaries` and busybox applets.
# Can be "/bin" or "/usr/bin".
bins_dir = "/usr/bin"

# Binaries to copy
binaries = ["init", "rind", "example-active", "example-inactive", "user_login", "user_shell", "tcp", "ipc_so"]
# Supported forms:
# - "name" -> copied to bins_dir (or /usr/bin by default)
# - "name:/absolute/path"
# - legacy: "bin:name" / "/bin:name" / "usr/bin:name" / "/usr/bin:name"

# Symbolic Links
symlinks = [
  # libs and bins
  "/usr/bin:bin",
  "/usr/lib:/lib",
  "/usr/lib:/lib64",
  "/usr/lib:/usr/lib64"
]

# ldd_bins = ["/usr/bin/init"]

# Files:
# - local copy: "local_path:/dst/path"
# - archive extract: "@alias:member/in/archive:/dst/path"
files = [
  "examples/units:/etc/units",
  "examples/fallback.toml:/etc/fallback.toml",
  "crates/api/examples/api.c:/home/makano/api.c",
  "target/x86_64-unknown-linux-gnu/release/librind_test_plugin.so:/usr/lib/rind/plugins/librind_test_plugin.so",
  "@glibc:usr/bin:/usr/bin",
  "@glibc:var/db:/var/db",
  "@glibc:etc:/etc",
  "@glibc:usr/include:/usr/include",
  "@glibc:usr/lib:/usr/lib",
  "@glibc:usr/share:/usr/share",
  # libs
  "@libasan:usr:/usr",
  "@libatomic:usr:/usr",
  "@libgcc:usr:/usr",
  "@libgfortran:usr:/usr",
  "@libgomp:usr:/usr",
  "@liblsan:usr:/usr",
  "@libobjc:usr:/usr",
  "@libquadmath:usr:/usr",
  "@libstdcpp:usr:/usr",
  "@libtsan:usr:/usr",
  "@libubsan:usr:/usr",

  # libs extra
  "@libidn2:usr:/usr",
  "@libnghttp2:usr:/usr",
  "@libnghttp3:usr:/usr",
  "@libngtcp2:usr:/usr",
  "@libssh2:usr:/usr",
  "@libpsl:usr:/usr",
  "@libunistring:usr:/usr",

  # gcc
  "@gcc:usr:/usr",
  "@libmpc:usr:/usr",
  "@libisl:usr:/usr",
  "@gmp:usr:/usr",
  "@mpfr:usr:/usr",

  # deps
  "@binutils:usr:/usr",
  "@jansson:usr:/usr",
  "@libelf:usr:/usr",
  "@bzip2:usr:/usr",
  "@json-c:usr:/usr",
  "@xz:usr:/usr",
  "@openssl:usr:/usr",
  "@brotli:usr:/usr",
  "@zlib:usr:/usr",
  "@zstd:usr:/usr",
  "@openssl:usr:/usr",
  "@krb5:usr:/usr",
  "@ca-certificates:usr:/usr",
  "@e2fsprogs:usr:/usr",
  "@keyutils:usr:/usr",
  "@linux-headers:usr/lib/modules/6.19.11-arch1-1/build/include/uapi:/usr/include",
  "@linux-headers:usr/lib/modules/6.19.11-arch1-1/build/arch/x86/include/uapi:/usr/include",
  "@linux-headers:usr/lib/modules/6.19.11-arch1-1/build/arch/x86/include/generated/uapi:/usr/include",

  # utils
  "@socat:usr:/usr",
  "@readline:usr:/usr",
  "@ncurses:usr:/usr",
  "@curl:usr:/usr",
]

# Installer cache sources:
# - "https://..."
# - "alias:https://..."
install = [
  "glibc:https://mirror.moson.org/arch/core/os/x86_64/glibc-2.43+r5+g856c426a7534-1-x86_64.pkg.tar.zst",

  # libs
  "libasan:https://archlinux.org/packages/core/x86_64/libasan/download",
  "libatomic:https://archlinux.org/packages/core/x86_64/libatomic/download",
  "libgcc:https://archlinux.org/packages/core/x86_64/libgcc/download",
  "libgfortran:https://archlinux.org/packages/core/x86_64/libgfortran/download",
