
# Only one "main" profile is available for now
[profile.main]
# Build command
build_command = "cargo build --release --target x86_64-unknown-linux-gnu"

# Which path the binaries are copied from
binary_target = "target/x86_64-unknown-linux-gnu/release"

# Default destination for binaries copied from `binaries` and busybox applets.
# Can be "/bin" or "/usr/bin".
bins_dir = "/usr/bin"

# Binaries to copy
binaries = ["init", "rind", "example-active", "example-inactive", "user_login", "user_shell"]
# Supported forms:
# - "name" -> copied to bins_dir (or /usr/bin by default)
# - "name:/absolute/path"
# - legacy: "bin:name" / "/bin:name" / "usr/bin:name" / "/usr/bin:name"

# Symbolic Links
symlinks = [
  # libs and bins
  "/usr/bin:bin",
  "/usr/lib:/lib",
  "/usr/lib:/lib64",
  "/usr/lib:/usr/lib64"
]

# ldd_bins = ["/usr/bin/init"]

# Files:
# - local copy: "local_path:/dst/path"
# - archive extract: "@alias:member/in/archive:/dst/path"
files = [
  "examples/units:/etc/units",
  "examples/fallback.toml:/etc/fallback.toml",
  "rind-api/examples/api.c:/home/makano/api.c",
  "@glibc:usr/bin:/usr/bin",
  "@glibc:var/db:/var/db",
  "@glibc:etc:/etc",
  "@glibc:usr/include:/usr/include",
  "@glibc:usr/lib:/usr/lib",
  "@glibc:usr/share:/usr/share",
  # libs
  "@libasan:usr:/usr",
  "@libatomic:usr:/usr",
  "@libgcc:usr:/usr",
  "@libgfortran:usr:/usr",
  "@libgomp:usr:/usr",
  "@liblsan:usr:/usr",
  "@libobjc:usr:/usr",
  "@libquadmath:usr:/usr",
  "@libstdcpp:usr:/usr",
  "@libtsan:usr:/usr",
  "@libubsan:usr:/usr",

  # gcc
  "@gcc:usr:/usr",
  "@libmpc:usr:/usr",
  "@libisl:usr:/usr",
  "@gmp:usr:/usr",
  "@mpfr:usr:/usr",

  # deps
  "@binutils:usr:/usr",
  "@jansson:usr:/usr",
  "@libelf:usr:/usr",
  "@bzip2:usr:/usr",
  "@curl:usr:/usr",
  "@json-c:usr:/usr",
  "@xz:usr:/usr",
  "@zlib:usr:/usr",
  "@zstd:usr:/usr",
]

# Installer cache sources:
# - "https://..."
# - "alias:https://..."
install = [
  "glibc:https://mirror.moson.org/arch/core/os/x86_64/glibc-2.43+r5+g856c426a7534-1-x86_64.pkg.tar.zst",

  # libs
  "libasan:https://archlinux.org/packages/core/x86_64/libasan/download",
  "libatomic:https://archlinux.org/packages/core/x86_64/libatomic/download",
  "libgcc:https://archlinux.org/packages/core/x86_64/libgcc/download",
  "libgfortran:https://archlinux.org/packages/core/x86_64/libgfortran/download",
  "libgomp:https://archlinux.org/packages/core/x86_64/libgomp/download",
  "liblsan:https://archlinux.org/packages/core/x86_64/liblsan/download",
  "libobjc:https://archlinux.org/packages/core/x86_64/libobjc/download",
  "libquadmath:https://archlinux.org/packages/core/x86_64/libquadmath/download",
  "libstdcpp:https://archlinux.org/packages/core/x86_64/libstdc++/download",
  "libtsan:https://archlinux.org/packages/core/x86_64/libtsan/download",
  "libubsan:https://archlinux.org/packages/core/x86_64/libubsan/download",
  "libubsan:https://archlinux.org/packages/core/x86_64/libubsan/download",

  # gcc
  "gcc:https://archlinux.org/packages/core/x86_64/gcc/download",
  "libmpc:https://archlinux.org/packages/core/x86_64/libmpc/download",
  "libisl:https://archlinux.org/packages/core/x86_64/libisl/download",
  "gmp:https://archlinux.org/packages/core/x86_64/gmp/download",
  "mpfr:https://archlinux.org/packages/core/x86_64/mpfr/download",

  # deps
  "binutils:https://archlinux.org/packages/core/x86_64/binutils/download",
  "jansson:https://archlinux.org/packages/core/x86_64/jansson/download",
  "libelf:https://archlinux.org/packages/core/x86_64/libelf/download",
  "bzip2:https://archlinux.org/packages/core/x86_64/bzip2/download",
  "curl:https://archlinux.org/packages/core/x86_64/curl/download",
  "json-c:https://archlinux.org/packages/core/x86_64/json-c/download",
