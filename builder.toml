  "libssh2:https://archlinux.org/packages/core/x86_64/libssh2/download",
  "libpsl:https://archlinux.org/packages/core/x86_64/libpsl/download",
  "libunistring:https://archlinux.org/packages/core/x86_64/libunistring/download",

  # gcc
  "gcc:https://archlinux.org/packages/core/x86_64/gcc/download",
  "libmpc:https://archlinux.org/packages/core/x86_64/libmpc/download",
  "libisl:https://archlinux.org/packages/core/x86_64/libisl/download",
  "gmp:https://archlinux.org/packages/core/x86_64/gmp/download",
  "mpfr:https://archlinux.org/packages/core/x86_64/mpfr/download",

  # deps
  "binutils:https://archlinux.org/packages/core/x86_64/binutils/download",
  "jansson:https://archlinux.org/packages/core/x86_64/jansson/download",
  "libelf:https://archlinux.org/packages/core/x86_64/libelf/download",
  "bzip2:https://archlinux.org/packages/core/x86_64/bzip2/download",
  "json-c:https://archlinux.org/packages/core/x86_64/json-c/download",
  "xz:https://archlinux.org/packages/core/x86_64/xz/download",
  "openssl:https://archlinux.org/packages/core/x86_64/openssl/download",
  "brotli:https://archlinux.org/packages/core/x86_64/brotli/download",
