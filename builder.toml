  "libubsan:https://archlinux.org/packages/core/x86_64/libubsan/download",
  "libubsan:https://archlinux.org/packages/core/x86_64/libubsan/download",

  # libs extra
  "libidn2:https://archlinux.org/packages/core/x86_64/libidn2/download",
  "libnghttp2:https://archlinux.org/packages/core/x86_64/libnghttp2/download",
  "libnghttp3:https://archlinux.org/packages/core/x86_64/libnghttp3/download",
