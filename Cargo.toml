[workspace]
members = [
  "rind-cli",
  # "rind-daemon",
  "rind-core",
  # "rind-common",
  "rind-base",
  "rind-init", "rind-macros",
  "rind-ipc",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
once_cell = "*"
# sdlang = "*"
toml = "*"
glob = "*"
nix = { version = "*", features = ["process", "acct", "socket", "term", "poll", "signal", "mount"] }
libc = "*"
serde = { version = "*", features = ["derive"] }
anyhow = "*"
clap = { version = "*", features = ["derive"] }
strumbra = "*"
serde_json = "1"
bincode-next = { version = "*", features = ["serde"] }
crc32fast = "*"
fxhash = "*"
bitflags = "*"

[profile.release]
lto = true
panic = "abort"
strip = true
