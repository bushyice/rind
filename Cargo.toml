[workspace]
members = [
  "crates/cli",
  # "crates/daemon",
  "crates/core",
  # "crates/common",
  "crates/base",
  "crates/init", "crates/macros",
  "crates/ipc", "crates/api", "crates/plugins", "crates/rind-test-plugin", "crates/tty-plugin", "crates/networking",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MPL-2.0"

[workspace.dependencies]
once_cell = "*"
# sdlang = "*"
toml = "*"
glob = "*"
nix = { version = "*", features = ["process", "acct", "socket", "term", "poll", "signal", "mount", "event", "time", "net"] }
libc = "*"
serde = { version = "*", features = ["derive"] }
anyhow = "*"
clap = { version = "*", features = ["derive"] }
strumbra = "*"
serde_json = "1"
bincode-next = { version = "*", features = ["serde"] }
crc32fast = "*"
fxhash = "*"
bitflags = "*"
libloading = "*"

# [profile.release]
# lto = true
# panic = "abort"
# strip = true
